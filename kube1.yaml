apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-first-deployment
  labels:
    app: webserver
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-first-app
  template:
    metadata:
      labels:
        app: my-first-app
    spec:
      containers:
      - name: first-container
        image: rohitbhatt8988/second:4
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: my-first-service
spec:
  type: NodePort
  selector:
    app: my-first-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
