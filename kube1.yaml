apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-first-deployment
  labels:
    app: webserver
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-first-app
  template:
    metadata:
      labels:
        app: my-first-app
    spec:
      containers:
      - name: first-container
        image: rohitbhatt8988/second:4
        ports:
        - containerPort: 80
        volumeMounts:
          - name: config-vol
            mountPath: /etc/config
          - name: Secret-vol
            mountPath: /etc/secret
            readOnly: true 

        volumes:
          - name: config-vol
            configMap:
              name: webapp-config

          - name: secret-vol
            secret:
              secretName: app-secret-auto
        env:
         - name: DATABASE_URL
           valueFrom:
            configMapKeyRef:
             name: webapp-config
             key: DATABASE_URL

         - name:  MAX_CONNECTIONS
           valueFrom:
            configMapKeyRef:
             name: webapp-config
             key: MAX_CONNECTIONS

        envFrom:
        - secretRef: 
           name: app-secret-auto
---
apiVersion: v1
kind: Service
metadata:
  name: my-first-service
spec:
  type: NodePort
  selector:
    app: my-first-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
