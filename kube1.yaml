apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: my-first-replicaset
  labels:
    app: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: my-first-container
        image: rohitbhatt8988/second:4
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: my-first-service
spec:
  type: NodePort
  selector:
    app: web
  ports:
  - port: 80
    targetPort: 80
